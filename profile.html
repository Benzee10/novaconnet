<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <span class="header-title">Profiles</span>
    </div>
  </header>

  <main class="page" id="mainContent"></main>

  <footer class="site-footer">
    &copy; <span id="year"></span> &mdash; For adults 18+ only.
  </footer>

  <script src="profiles.js"></script>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    const params = new URLSearchParams(window.location.search);
    const id = parseInt(params.get('id'));
    const profile = profiles.find(p => p.id === id);
    const main = document.getElementById('mainContent');

    if (!profile) {
      main.innerHTML = `
        <a href="/" class="back-btn">← Back</a>
        <div class="not-found">
          <h2>Profile not found</h2>
          <p>This profile may have been removed or the link is incorrect.</p>
          <a href="/" class="card-btn" style="display:inline-block;width:auto;padding:12px 32px;">Browse Profiles</a>
        </div>
      `;
    } else {
      document.title = `${profile.name}, ${profile.age}`;

      const interestTags = profile.interests.map(i => `<span class="interest-tag">${i}</span>`).join('');
      const thumbs = profile.photos.map((src, idx) => `
        <div class="gallery-thumb ${idx === 0 ? 'active' : ''}" data-idx="${idx}">
          <img src="${src}" alt="${profile.name} photo ${idx + 1}" loading="lazy" />
        </div>
      `).join('');

      main.innerHTML = `
        <a href="/" class="back-btn">← Back</a>
        <div class="profile-detail">

          <div class="gallery">
            <div class="gallery-main">
              <img id="mainPhoto" src="${profile.photos[0]}" alt="${profile.name}" />
            </div>
            <div class="gallery-thumbs" id="thumbsRow">${thumbs}</div>
          </div>

          <div class="profile-info">

            <div>
              <div class="profile-name-row">
                <h1 class="profile-name">${profile.name}</h1>
                <span class="profile-age-badge">${profile.age}</span>
              </div>
              <div class="profile-location">📍 ${profile.location}</div>
            </div>

            <div class="info-section">
              <h3>About Me</h3>
              <p>${profile.bio}</p>
            </div>

            <div class="info-section">
              <h3>Interests</h3>
              <div class="interests-list">${interestTags}</div>
            </div>

            <div class="contact-section">
              <a
                class="btn-whatsapp"
                href="https://wa.me/${profile.whatsapp}?text=Hi%20${encodeURIComponent(profile.name)}!%20I%20saw%20your%20profile%20and%20would%20love%20to%20connect%20%F0%9F%98%8A"
                target="_blank"
                rel="noopener noreferrer"
              >
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                Contact on WhatsApp
              </a>
            </div>

          </div>
        </div>
      `;

      document.getElementById('thumbsRow').addEventListener('click', e => {
        const thumb = e.target.closest('.gallery-thumb');
        if (!thumb) return;
        const idx = parseInt(thumb.dataset.idx);
        document.getElementById('mainPhoto').src = profile.photos[idx];
        document.querySelectorAll('.gallery-thumb').forEach((t, i) => {
          t.classList.toggle('active', i === idx);
        });
      });
    }
  </script>
</body>
</html>
